name: save-voltaic-html-commit

on:
  schedule:
    - cron: '*/30 * * * *'   # 매 30분마다 (UTC 기준)
  workflow_dispatch: {}      # 수동 실행 버튼

concurrency:
  group: save-voltaic-html-commit
  cancel-in-progress: true

jobs:
  fetch_and_commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true  # GITHUB_TOKEN으로 push 가능

      - name: Fetch HTML with curl
        run: |
          set -euo pipefail
          URL="https://app.voltaic.gg/koko_0726"
          FNAME="koko_0726 _ Voltaic App.html"
          mkdir -p saved_html
          # -L: 리다이렉트 따라감, --retry: 재시도, -A: user-agent
          curl -L --retry 3 --max-time 30 -A "Mozilla/5.0 (X11; Linux x86_64)" "$URL" -o "saved_html/$FNAME"
          echo "Saved to saved_html/$FNAME"
          ls -l saved_html

      - name: Commit & push if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          FNAME="saved_html/koko_0726 _ Voltaic App.html"

          # Git author 설정
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 스테이징
          git add --force "$FNAME" || true

          # 스테이징된 변경 내용이 있는지 검사
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            # 커밋 메시지에 UTC 타임스탬프 추가
            git commit -m "auto-save voltaic html: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            # 현재 HEAD 브랜치로 푸시
            git push origin HEAD
            echo "Pushed changes."
          fi