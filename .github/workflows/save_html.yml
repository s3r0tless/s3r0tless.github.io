name: save-voltaic-html-curl
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

concurrency:
  group: save-voltaic-html-curl
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch HTML with curl
        run: |
          URL="https://app.voltaic.gg/koko_0726"
          FNAME="koko_0726 _ Voltaic App.html"
          mkdir -p output
          # -L: 리다이렉트 따라감, --retry: 재시도
          curl -L --retry 3 --max-time 30 "$URL" -o "output/$FNAME"

      - name: Upload HTML as artifact
        uses: actions/upload-artifact@v4
        with:
          name: voltaic-html
          path: output/"koko_0726 _ Voltaic App.html"